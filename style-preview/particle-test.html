<script>
(function() {
  var pathD = 'M116 0C127.331 0 138.282 1.62627 148.634 4.65527C155.871 3.24161 163.349 2.5 171 2.5C228.978 2.5 277.019 45.0344 285.626 100.601C292.038 101.401 297 106.871 297 113.5C297 119.737 292.607 124.948 286.746 126.208C282.779 186.679 232.475 234.5 171 234.5C159.669 234.5 148.717 232.873 138.365 229.844C131.128 231.257 123.651 232 116 232C51.935 232 0 180.065 0 116C3.8656e-07 51.935 51.935 3.8666e-07 116 0ZM157.276 7.94727L178.232 18.4248L186.689 24.8916L194.651 31.8594L209.095 46.7998L221.046 68.2129L229.511 91.1172L230.254 96.8145L231 102.541L231.499 114L230.502 136.916L223.534 159.811L212.083 181.22L199.142 197.147L182.221 211.58L149.779 227.552L148.243 228.308L149.944 228.497L172.506 231.004L172.566 230.996L195.066 227.996L195.107 227.99L195.147 227.978L208.147 223.978L208.175 223.97L208.201 223.958L220.701 218.458L220.725 218.447L220.746 218.436L232.246 211.936L232.271 211.921L232.294 211.904L243.326 203.881L253.875 193.332L253.894 193.309L262.894 181.809L262.913 181.784L262.929 181.757L271.929 166.757L271.953 166.716L271.97 166.671L277.97 150.171L277.98 150.142L277.987 150.11L280.487 139.11L280.491 139.097L280.493 139.082L281.5 133.041V127.276L281.333 127.127L279.892 125.837C276.477 124.7 273.692 122.185 272.196 118.952L272.021 118.795L272.038 118.599C271.37 117.033 271 115.31 271 113.5C271 107.193 275.491 101.935 281.45 100.75L278.483 89.374L278.479 89.3574L278.475 89.3418L274.475 77.3418L274.463 77.3105L269.963 66.3105L269.945 66.2666L269.919 66.2275L263.419 56.2275L263.413 56.2178L263.406 56.208L254.406 43.708L254.373 43.6621L254.331 43.626L241.331 32.126L241.313 32.1094L241.293 32.0947L226.793 21.5947L226.76 21.5713L226.724 21.5527L210.681 13.5312L210.635 13.5186L198.135 10.0186L198.126 10.0156L198.116 10.0137L185.616 7.01367L185.56 7H157.5L157.276 7.94727ZM148.434 9.57617C96.8968 19.629 58 65.0213 58 119.5C58 169.71 91.0405 212.203 136.565 226.424C188.103 216.371 227 170.979 227 116.5C227 66.2893 193.959 23.7965 148.434 9.57617ZM127 47.4814C139.912 45.6224 139.005 46.9739 139 46.9814L140 64.9814C140 64.9814 141.357 66.4751 142.5 66.9814C144.65 67.9336 147.627 68.6645 148.5 66.4814C150.5 61.4814 149.5 46.9814 149.5 46.9814H161.5C161.5 46.9814 160.72 59.7515 162.5 65.4814C163.806 69.6862 178.5 70.4815 182.5 73.4814C186.5 76.4814 190.857 80.623 192 87.4814C193.147 94.3645 189.5 101.981 185.5 106.481L182.5 109.481C182.29 111.487 189.296 113.742 191 114.981C196.492 118.976 197.996 127.955 198 127.981C198 127.981 198.5 139.481 195 145.481C190.452 153.278 186.07 155.071 178.5 158.481C171.653 161.566 160.006 161.981 160 161.981V181.981H148.5L147 179.981V165.481C147 163.981 146.5 163.481 145 162.481H138.5C137 163.481 137.5 164.981 137.5 166.481V181.981H127L125 179.981L124.5 164.481C124.5 162.981 123.5 161.981 122.5 161.481C121.5 160.981 103.5 159.981 103.5 159.981L101 158.481L102.5 146.981L114 145.981L115.5 143.981L117 86.4814C117 76.4862 103.512 77.9801 103.5 77.9814L101.5 76.4814V66.4814H125.5C128.001 60.1449 127.251 55.0941 127 47.4814ZM137.5 145.481L139.5 146.981H158C163.5 145.481 166.5 144.481 170.5 140.481C172.5 137.481 173 134.981 172.5 131.481C171 124.981 166.5 122.981 160 120.981C152 119.481 147 119.481 138.5 119.481L137.5 145.481ZM139 82.9814L138.5 106.481H158L164 102.981L166.5 100.981L167.5 98.4814L168 94.9814L167 89.9814L165.5 87.4814L163 84.9814C159.5 83.4814 157 82.4814 151.5 81.9814L139.5 80.9814L139 82.9814Z';

  var debug = document.getElementById('debug');
  var svgW = 297, svgH = 235;
  var canvasW = 500, canvasH = 390;
  var PARTICLE_COUNT = 2500;
  var particles = [];
  var time = 0;

  // 高精度采样: SVG → Image → 离屏Canvas (3倍分辨率) → 逐像素扫描
  function sampleHighRes(cb) {
    // 3倍超采样，细节不丢失
    var SUPER = 6;
    var baseScale = Math.min(canvasW / svgW, canvasH / svgH) * 0.85;
    var hiScale = baseScale * SUPER;
    var hiW = Math.ceil(svgW * hiScale);
    var hiH = Math.ceil(svgH * hiScale);

    debug.innerHTML += '<br>高精度采样: 超采样' + SUPER + 'x, hiW=' + hiW + ', hiH=' + hiH;

    var svgStr = '<svg xmlns="http://www.w3.org/2000/svg" width="' + hiW + '" height="' + hiH + '" viewBox="0 0 ' + svgW + ' ' + svgH + '">'
      + '<path d="' + pathD + '" fill="#fff"/>'
      + '</svg>';

    var blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var img = new Image();
    img.onload = function() {
      var offCanvas = document.createElement('canvas');
      offCanvas.width = hiW;
      offCanvas.height = hiH;
      var offCtx = offCanvas.getContext('2d');
      offCtx.drawImage(img, 0, 0, hiW, hiH);
      URL.revokeObjectURL(url);

      // 显示到预览 canvas（缩放回原始尺寸）
      var preview = document.getElementById('offscreenPreview');
      preview.width = hiW;
      preview.height = hiH;
      preview.style.maxWidth = '300px';
      preview.style.height = 'auto';
      preview.getContext('2d').drawImage(offCanvas, 0, 0);

      var imageData = offCtx.getImageData(0, 0, hiW, hiH);
      var data = imageData.data;

      // 逐像素扫描，收集所有填充点
      var rawPoints = [];
      for (var y = 0; y < hiH; y++) {
        for (var x = 0; x < hiW; x++) {
          var idx = (y * hiW + x) * 4;
          if (data[idx + 3] > 128) {
            rawPoints.push({ x: x, y: y });
          }
        }
      }

      debug.innerHTML += '<br>原始填充像素=' + rawPoints.length;

      // 从海量原始点中均匀选取 PARTICLE_COUNT 个
      // 用最大最小距离采样，保证分布均匀且保留细节
      var step = Math.max(1, Math.floor(rawPoints.length / PARTICLE_COUNT));
      var displayW = Math.ceil(svgW * baseScale);
      var displayH = Math.ceil(svgH * baseScale);
      var offsetX = (canvasW - displayW) / 2;
      var offsetY = (canvasH - displayH) / 2;
      var points = [];
      for (var i = 0; i < rawPoints.length; i += step) {
        points.push({
          x: rawPoints[i].x / SUPER + offsetX,
          y: rawPoints[i].y / SUPER + offsetY
        });
      }

      debug.innerHTML += '<br>最终粒子目标点=' + points.length;
      cb(points);
    };
    img.onerror = function() {
      debug.innerHTML += '<br><span style="color:#ff6b6b">采样失败: Image 加载出错</span>';
      URL.revokeObjectURL(url);
      cb([]);
    };
    img.src = url;
  }

  function startParticles(targets) {
    if (targets.length === 0) {
      debug.innerHTML += '<br><span style="color:#ff6b6b">没有采样到任何点！</span>';
      return;
    }
    particles = [];
    for (var i = 0; i < PARTICLE_COUNT; i++) {
      var t = targets[i % targets.length];
      particles.push({
        x: Math.random() * canvasW,
        y: Math.random() * canvasH,
        tx: t.x,
        ty: t.y,
        vx: 0, vy: 0,
        size: 1.5,
        alpha: 0.6 + Math.random() * 0.4,
        phase: Math.random() * Math.PI * 2
      });
    }
    debug.innerHTML += '<br>粒子数=' + particles.length + '，开始动画...';
    animate();
  }

  function animate() {
    var canvas = document.getElementById('particleCanvas');
    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvasW, canvasH);
    time += 0.016;

    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      var breathX = Math.sin(time * 0.8 + p.phase) * 1.5;
      var breathY = Math.cos(time * 0.6 + p.phase * 1.3) * 1.5;
      var targetX = p.tx + breathX;
      var targetY = p.ty + breathY;

      p.vx += (targetX - p.x) * 0.06;
      p.vy += (targetY - p.y) * 0.06;
      p.vx *= 0.85;
      p.vy *= 0.85;
      p.x += p.vx;
      p.y += p.vy;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(191,161,74,' + (p.alpha * 0.15).toFixed(2) + ')';
      ctx.fill();
    }
    requestAnimationFrame(animate);
  }

  sampleHighRes(function(points) {
    if (points.length > 0) {
      debug.innerHTML += '<br><span style="color:#00ff88">采样成功</span>';
      startParticles(points);
    } else {
      debug.innerHTML += '<br><span style="color:#ff6b6b">采样失败，无数据！</span>';
    }
  });
})();
</script>
